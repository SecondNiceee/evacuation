server {
    listen 80;
    server_name 155.212.138.216;

    # Logs
    access_log /var/log/nginx/education_access.log;
    error_log /var/log/nginx/education_error.log;

    # Static files from Next.js
    location /_next/static {
        alias /var/www/site/education/.next/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Public folder
    location /public {
        alias /var/www/site/education/public;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Favicon and other root static files
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        root /var/www/site/education/public;
        expires 30d;
    }

    # Reverse proxy to Next.js server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
